version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - bot
      - admin
      - flower
      - grafana
    restart: unless-stopped

  bot:
    build: .
    command: python -m bot.main
    env_file: .env
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    command: uvicorn admin.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped

  celery-worker:
    build: .
    command: celery -A tasks.celery_app:celery_app worker --loglevel=info --concurrency=3
    env_file: .env
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A tasks.celery_app:celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  flower:
    build: .
    command: celery -A tasks.celery_app:celery_app flower --port=5555
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: jambot
      POSTGRES_USER: jambot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    restart: unless-stopped

  loki:
    image: grafana/loki
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  grafana_data:
