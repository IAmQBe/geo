<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login</title>
    <style>
      body { margin: 0; font-family: "SF Mono", Menlo, Monaco, monospace; background: linear-gradient(120deg, #f3f2ec, #ddd6c8); }
      .box { width: 320px; margin: 100px auto; background: #fff; border: 1px solid #bbb; padding: 20px; }
      input { width: 100%; margin-bottom: 12px; padding: 8px; }
      button { width: 100%; padding: 10px; background: #111; color: #fff; border: 0; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="box">
      <h3>Jam Bot Admin</h3>
      <form method="post" action="/admin/login">
        <input name="username" placeholder="Username" required />
        <input name="password" type="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
      <p>Default password fallback for dev: <code>admin</code></p>
    </div>
  </body>
</html>
